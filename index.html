<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AgroControl — Sistema de gestión para cultivo de plátano hartón en Granada, Meta, Colombia">
  <meta name="theme-color" content="#22c55e">
  <title>AgroControl — Plátano Hartón</title>

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌿</text></svg>">

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/responsive.css">

<body>
  <div id="app">
    <!-- Splash screen mientras carga -->
    <div style="
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      gap:1rem;
      background:var(--color-bg);
      color:var(--color-text-secondary);
      font-family:var(--font-sans)
    ">
      <div style="font-size:3rem">🌿</div>
      <div style="font-weight:700;font-size:1.25rem;color:var(--color-text)">AgroControl</div>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- App JS (ES Modules) -->
  <script type="module" src="js/app.js"></script>
